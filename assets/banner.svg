<svg width="1280" height="380" viewBox="0 0 1280 380" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#0c2733"/>
      <stop offset="1" stop-color="#0e3a47"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="tealH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0891b2"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="blurGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1280" height="380" rx="0" fill="url(#bg)"/>
  <!-- animated ambient glow -->
  <circle cx="980" cy="120" r="280" fill="url(#glow)">
    <animate attributeName="cy" values="120;180;120" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="240" cy="330" r="220" fill="url(#glow)" opacity="0.35">
    <animate attributeName="cx" values="240;320;240" dur="11s" repeatCount="indefinite"/>
  </circle>

  <!-- subtle dotted grid -->
  <g fill="#67e8f9" opacity="0.07">
    <g>
      <circle cx="60" cy="40" r="2"/><circle cx="120" cy="40" r="2"/><circle cx="180" cy="40" r="2"/>
      <circle cx="60" cy="100" r="2"/><circle cx="120" cy="100" r="2"/><circle cx="180" cy="100" r="2"/>
      <circle cx="60" cy="160" r="2"/><circle cx="120" cy="160" r="2"/><circle cx="180" cy="160" r="2"/>
    </g>
  </g>

  <!-- ===================== LEFT: brand + headline ===================== -->
  <!-- logo tile -->
  <g filter="url(#soft)">
    <rect x="64" y="56" width="64" height="64" rx="16" fill="url(#teal)"/>
  </g>
  <!-- EKG pulse mark inside tile -->
  <path d="M80 88 h10 l6 -16 l8 32 l7 -22 l5 6 h11" fill="none" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="stroke-dasharray" values="0 90; 90 0" dur="2.2s" repeatCount="indefinite"/>
  </path>

  <text x="146" y="84" fill="#e2e8f0" font-size="30" font-weight="800" letter-spacing="-0.5">MedArchive</text>
  <text x="148" y="108" fill="#5eead4" font-size="13.5" font-weight="700" letter-spacing="3">MEDPARTNERS · ХАКАТОН · КЕЙС 2</text>

  <!-- headline -->
  <text x="64" y="186" fill="#f8fafc" font-size="38" font-weight="800" letter-spacing="-1">Архив прайс-листов клиник</text>
  <text x="64" y="232" fill="#f8fafc" font-size="38" font-weight="800" letter-spacing="-1">→ <tspan fill="#22d3ee">база услуг и цен</tspan></text>
  <text x="66" y="270" fill="#94a3b8" font-size="16.5" font-weight="500">PDF · OCR-скан · DOCX (tracked changes) · XLSX&#160;&#160;→&#160;&#160;нормализация · история цен · REST API</text>

  <!-- metric pills -->
  <g font-weight="700">
    <g>
      <rect x="64" y="298" width="186" height="46" rx="23" fill="#0e7490" fill-opacity="0.18" stroke="#22d3ee" stroke-opacity="0.4"/>
      <text x="84" y="327" fill="#22d3ee" font-size="20" font-weight="800">93.8%</text>
      <text x="150" y="320" fill="#cbd5e1" font-size="11.5">авто-</text>
      <text x="150" y="334" fill="#cbd5e1" font-size="11.5">нормализация</text>
    </g>
    <g transform="translate(196,0)">
      <rect x="64" y="298" width="118" height="46" rx="23" fill="#0e7490" fill-opacity="0.18" stroke="#22d3ee" stroke-opacity="0.4"/>
      <text x="84" y="327" fill="#e2e8f0" font-size="20" font-weight="800">5</text>
      <text x="104" y="320" fill="#cbd5e1" font-size="11.5">форматов</text>
      <text x="104" y="334" fill="#94a3b8" font-size="11.5">+ OCR</text>
    </g>
    <g transform="translate(330,0)">
      <rect x="64" y="298" width="150" height="46" rx="23" fill="#0e7490" fill-opacity="0.18" stroke="#22d3ee" stroke-opacity="0.4"/>
      <text x="84" y="327" fill="#34d399" font-size="20" font-weight="800">∞</text>
      <text x="108" y="320" fill="#cbd5e1" font-size="11.5">история</text>
      <text x="108" y="334" fill="#94a3b8" font-size="11.5">версий цен</text>
    </g>
  </g>

  <!-- ===================== RIGHT: animated mini-pipeline ===================== -->
  <g transform="translate(742,70)">
    <!-- connecting rail -->
    <path id="rail" d="M70 70 H210 a18 18 0 0 1 18 18 V150 a18 18 0 0 0 18 18 H360" fill="none" stroke="#1e3a47" stroke-width="3"/>
    <path d="M70 70 H210 a18 18 0 0 1 18 18 V150 a18 18 0 0 0 18 18 H360" fill="none" stroke="url(#tealH)" stroke-width="3" stroke-dasharray="14 220" stroke-linecap="round">
      <animate attributeName="stroke-dashoffset" values="234;0" dur="2.6s" repeatCount="indefinite"/>
    </path>

    <!-- format chips (sources) -->
    <g font-size="13" font-weight="700" text-anchor="middle">
      <g>
        <rect x="0" y="14" width="70" height="34" rx="9" fill="#13303c" stroke="#ef4444" stroke-opacity="0.6"/>
        <text x="35" y="36" fill="#fca5a5">PDF</text>
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -4;0 0" dur="3s" repeatCount="indefinite"/>
      </g>
      <g>
        <rect x="0" y="58" width="70" height="34" rx="9" fill="#13303c" stroke="#f59e0b" stroke-opacity="0.6"/>
        <text x="35" y="80" fill="#fcd34d">СКАН</text>
        <animateTransform attributeName="transform" type="translate" values="0 0;0 4;0 0" dur="3.4s" repeatCount="indefinite"/>
      </g>
      <g>
        <rect x="0" y="102" width="70" height="34" rx="9" fill="#13303c" stroke="#3b82f6" stroke-opacity="0.6"/>
        <text x="35" y="124" fill="#93c5fd">DOCX</text>
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -4;0 0" dur="3.2s" repeatCount="indefinite"/>
      </g>
      <g>
        <rect x="0" y="146" width="70" height="34" rx="9" fill="#13303c" stroke="#10b981" stroke-opacity="0.6"/>
        <text x="35" y="168" fill="#6ee7b7">XLSX</text>
        <animateTransform attributeName="transform" type="translate" values="0 0;0 4;0 0" dur="2.8s" repeatCount="indefinite"/>
      </g>
    </g>

    <!-- normalize core -->
    <g filter="url(#soft)">
      <rect x="150" y="74" width="120" height="56" rx="14" fill="#0e7490"/>
    </g>
    <rect x="150" y="74" width="120" height="56" rx="14" fill="none" stroke="#22d3ee" stroke-opacity="0.6">
      <animate attributeName="stroke-opacity" values="0.2;0.9;0.2" dur="2.2s" repeatCount="indefinite"/>
    </rect>
    <text x="210" y="98" text-anchor="middle" fill="#ffffff" font-size="13.5" font-weight="800">normalize</text>
    <text x="210" y="116" text-anchor="middle" fill="#bae6fd" font-size="10.5" font-weight="600">exact·syn·fuzzy·emb</text>

    <!-- DB cylinder -->
    <g transform="translate(330,118)">
      <ellipse cx="40" cy="8" rx="40" ry="12" fill="#0b1220" stroke="#22d3ee" stroke-opacity="0.7"/>
      <path d="M0 8 V58 a40 12 0 0 0 80 0 V8" fill="#0c2733" stroke="#22d3ee" stroke-opacity="0.7"/>
      <ellipse cx="40" cy="8" rx="40" ry="12" fill="#0e7490" fill-opacity="0.35"/>
      <text x="40" y="44" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="800">DB</text>
    </g>

    <!-- flowing packet -->
    <circle r="6" fill="#a7f3d0">
      <animateMotion dur="2.6s" repeatCount="indefinite" rotate="auto" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
        <mpath href="#rail"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" dur="2.6s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>

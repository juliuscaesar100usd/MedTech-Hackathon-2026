      <rect x="22" y="54" width="86" height="22" rx="11" fill="#ecfeff"/><text x="65" y="69" text-anchor="middle" fill="#0e7490" font-size="11.5">Диагностика</text>
      <text x="122" y="69" fill="#64748b" font-size="12.5" font-weight="500">3 партнёра</text>

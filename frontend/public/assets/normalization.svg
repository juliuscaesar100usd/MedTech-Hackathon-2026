<svg width="1080" height="320" viewBox="0 0 1080 320" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, sans-serif">
  <defs>
    <filter id="nShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="conf" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <text x="40" y="36" fill="#0f172a" font-size="17" font-weight="800">Каскад нормализации</text>
  <text x="40" y="56" fill="#64748b" font-size="12.5" font-weight="600">первое совпадение ≥ порога останавливает каскад · авто-сопоставление при cosine ≥ 0.85</text>

  <!-- ===== source card ===== -->
  <g filter="url(#nShadow)"><rect x="40" y="92" width="210" height="150" rx="14" fill="#ffffff" stroke="#e2e8f0"/></g>
  <rect x="40" y="92" width="210" height="36" rx="14" fill="#f1f5f9"/>
  <rect x="40" y="110" width="210" height="18" fill="#f1f5f9"/>
  <text x="60" y="115" fill="#64748b" font-size="11" font-weight="700" letter-spacing="0.5">СЫРАЯ ПОЗИЦИЯ</text>
  <text x="60" y="160" fill="#0f172a" font-size="19" font-weight="800">«ОАК (кровь)»</text>
  <text x="60" y="186" fill="#64748b" font-size="12.5">Клиника №4 · XLSX</text>
  <text x="60" y="206" fill="#64748b" font-size="12.5">лист «Прайс 2026»</text>
  <text x="60" y="228" fill="#94a3b8" font-size="12">2 500 ₸ · резидент</text>

  <!-- arrow -->
  <path d="M256 167 H300" stroke="#cbd5e1" stroke-width="2.4" marker-end="url(#ah)"/>
  <defs><marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#cbd5e1"/></marker></defs>

  <!-- ===== cascade ===== -->
  <g font-size="13" font-weight="700">
    <!-- row: exact -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.2s" fill="freeze"/>
      <rect x="312" y="96" width="392" height="36" rx="10" fill="#fef2f2" stroke="#fecaca"/>
      <text x="330" y="119" fill="#0f172a">1 · Точное</text>
      <text x="470" y="119" fill="#64748b" font-weight="600">точное совпадение</text>
      <text x="688" y="119" fill="#dc2626" text-anchor="end">— мимо</text>
    </g>
    <!-- row: synonym -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.7s" fill="freeze"/>
      <rect x="312" y="138" width="392" height="36" rx="10" fill="#fef2f2" stroke="#fecaca"/>
      <text x="330" y="161" fill="#0f172a">2 · Синоним</text>
      <text x="470" y="161" fill="#64748b" font-weight="600">словарь синонимов</text>
      <text x="688" y="161" fill="#dc2626" text-anchor="end">— мимо</text>
    </g>
    <!-- row: fuzzy -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.2s" fill="freeze"/>
      <rect x="312" y="180" width="392" height="36" rx="10" fill="#fffbeb" stroke="#fde68a"/>
      <text x="330" y="203" fill="#0f172a">3 · Нечёткое</text>
      <text x="470" y="203" fill="#64748b" font-weight="600">RapidFuzz token-set</text>
      <text x="688" y="203" fill="#b45309" text-anchor="end">0.62 ↓</text>
    </g>
    <!-- row: embedding (winner) -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.7s" fill="freeze"/>
      <rect x="312" y="222" width="392" height="36" rx="10" fill="#ecfdf5" stroke="#6ee7b7"/>
      <rect x="312" y="222" width="392" height="36" rx="10" fill="none" stroke="#10b981" stroke-width="2">
        <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="1.6s" begin="2.1s" repeatCount="indefinite"/>
      </rect>
      <text x="330" y="245" fill="#0f172a">4 · Эмбеддинг</text>
      <text x="470" y="245" fill="#64748b" font-weight="600">multilingual-e5</text>
      <text x="688" y="245" fill="#059669" text-anchor="end" font-weight="800">0.93 ✓</text>
    </g>
  </g>

  <!-- arrow to result -->
  <path d="M712 240 H760" stroke="#cbd5e1" stroke-width="2.4" marker-end="url(#ah)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.1s" fill="freeze"/>
  </path>

  <!-- ===== result card ===== -->
  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.2s" fill="freeze"/>
    <g filter="url(#nShadow)"><rect x="772" y="96" width="268" height="120" rx="14" fill="#ffffff" stroke="#a7f3d0"/></g>
    <rect x="772" y="96" width="268" height="6" rx="3" fill="#10b981"/>
    <text x="792" y="130" fill="#64748b" font-size="11" font-weight="700" letter-spacing="0.5">НОРМАЛИЗОВАНО →</text>
    <text x="792" y="158" fill="#0f172a" font-size="18" font-weight="800">Общий анализ</text>
    <text x="792" y="180" fill="#0f172a" font-size="18" font-weight="800">крови</text>
    <rect x="792" y="192" width="104" height="20" rx="10" fill="#ecfeff"/>
    <text x="804" y="206" fill="#0e7490" font-size="11" font-weight="700">Лаборатория</text>
    <rect x="904" y="192" width="116" height="20" rx="10" fill="#ecfdf5"/>
    <text x="916" y="206" fill="#059669" font-size="11" font-weight="700">AUTO · 0.93</text>
  </g>

  <!-- ===== confidence meter ===== -->
  <g transform="translate(772,238)" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.3s" fill="freeze"/>
    <text x="0" y="0" fill="#64748b" font-size="11.5" font-weight="700">confidence</text>
    <rect x="0" y="10" width="268" height="12" rx="6" fill="#eef2f7"/>
    <!-- threshold 0.85 marker -->
    <line x1="228" y1="6" x2="228" y2="26" stroke="#94a3b8" stroke-width="2" stroke-dasharray="2 2"/>
    <text x="228" y="40" fill="#94a3b8" font-size="10" text-anchor="middle" font-weight="700">0.85</text>
    <rect x="0" y="10" width="0" height="12" rx="6" fill="url(#conf)">
      <animate attributeName="width" values="0;249" dur="1.1s" begin="2.4s" fill="freeze" calcMode="spline" keySplines="0.3 0 0.2 1"/>
    </rect>
  </g>
</svg>
